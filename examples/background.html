<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lazyish – Background Images</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .hero {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
      background-color: #eee;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    .hero.lazyloaded { opacity: 1; }
    .spacer { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    .gallery { display: flex; flex-direction: column; gap: 20px; padding: 20px; }
  </style>
</head>
<body>
  <div class="spacer">↓ Scroll down to see lazy background images ↓</div>
  <div class="gallery">
    <div class="lazyload hero" data-bg="https://picsum.photos/1200/400?random=20"></div>
    <div class="lazyload hero" data-bg="https://picsum.photos/1200/400?random=21"></div>
    <div class="lazyload hero" data-bg="https://picsum.photos/1200/400?random=22"></div>
  </div>

  <script type="module">
    import lazyish from '../dist/lazyish.esm.js';
    lazyish({ backgroundImages: true });
  </script>
</body>
</html>
