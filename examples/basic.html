<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lazyish – Basic Example</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .gallery { display: flex; flex-direction: column; gap: 20px; padding: 20px; }
    img {
      width: 100%;
      max-width: 800px;
      height: 400px;
      object-fit: cover;
      background: #eee;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    img.lazyloaded { opacity: 1; }
    img.lazyerror { opacity: 0.3; background: #f88; }
    /* Spacer to force scrolling */
    .spacer { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
  </style>
</head>
<body>
  <div class="spacer">↓ Scroll down to see lazy loading ↓</div>
  <div class="gallery">
    <img class="lazyload" data-src="https://picsum.photos/800/400?random=1" alt="Random image 1">
    <img class="lazyload" data-src="https://picsum.photos/800/400?random=2" alt="Random image 2">
    <img class="lazyload" data-src="https://picsum.photos/800/400?random=3" alt="Random image 3">
    <img class="lazyload" data-src="https://picsum.photos/800/400?random=4" alt="Random image 4">
    <img class="lazyload" data-src="https://picsum.photos/800/400?random=5" alt="Random image 5">
  </div>

  <script type="module">
    import lazyish from '../dist/lazyish.esm.js';
    lazyish();
  </script>
</body>
</html>
